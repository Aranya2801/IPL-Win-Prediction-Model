global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    project: 'ipl-win-predictor'
    environment: 'production'

scrape_configs:
  - job_name: 'ipl-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
